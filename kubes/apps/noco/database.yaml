apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: noco-pg
  namespace: noco-db
spec:
  instances: 3

  # PostgreSQL version
  imageName: ghcr.io/cloudnative-pg/postgresql:16.3

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1024MB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"

  bootstrap:
    initdb:
      database: noco
      owner: noco
      secret:
        name: noco-secrets

  superuserSecret:
    name: noco-super-secrets

  storage:
    size: 10Gi
    storageClass: longhorn-double

  monitoring:
    enablePodMonitor: true
