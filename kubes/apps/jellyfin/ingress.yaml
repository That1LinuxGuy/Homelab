apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-ingress
  namespace: jellyfin
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellyfin.713602.xyz`)
      kind: Rule
      services:
        - name: jellyfin
          port: 8096
  tls:
    store:
      name: default
      namespace: kube-system
