apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      version: '3.2.x'
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: flux-system

  values:
    extraContainers:
      - name: filebrowser
        image: filebrowser/filebrowser:v2
        ports:
          - containerPort: 80
        volumeMounts:
          name: media
          mountPath: /srv

    resources:
      limits:
        cpu: 500m
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 512Mi

    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      timeoutSeconds: 5 
      failureThreshold: 6
      periodSeconds: 10
    
    readinessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      periodSeconds: 10

    persistence:
      config:
        enabled: true
        size: 5Gi
        storageClass: longhorn-double
      media:
        enabled: true
        size: 100Gi
        storageClass: longhorn-double

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

