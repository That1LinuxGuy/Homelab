apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: baserow-pg
  namespace: baserow
spec:
  instances: 3

  # PostgreSQL version
  imageName: ghcr.io/cloudnative-pg/postgresql:16.3

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1024MB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"

  bootstrap:
    initdb:
      database: baserow
      owner: baserow
      secret:
        name: baserow-secrets

  superuserSecret:
    name: baserow-super-secrets

  backup:
    barmanObjectStore:
      destinationPath: "s3://baserow-bucket"
      endpointURL: "http://garage.garage.svc.cluster.local:3900"
      s3Credentials:
        accessKeyId:
          name: s3-keys
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: s3-keys
          key: SECRET_ACCESS_KEY

  storage:
    size: 10Gi
    storageClass: longhorn-double

  monitoring:
    enablePodMonitor: true

