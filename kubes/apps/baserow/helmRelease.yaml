
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: baserow
  namespace: baserow
spec:
  interval: 30m
  chart:
    spec:
      chart: baserow
      version: '1.0.x'
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: baserow
        namespace: flux-system

  values:
    global:
      baserow:
        domain: "baserow.713602.xyz"
        backendDomain: "api.baserow.713602.xyz"
        objectsDomain: "objects.baserow.713602.xyz"

    redis:
      enabled: false
    postresql:
      enabled: false
  
    backendSecrets:
      valuesFrom:
        secretRef:
          name: baserow-secrets

    ingres:
      enabled: true
    caddy:
      enabled: false

    minio:
      enabled: false

    backendConfigMap:
      AWS_STORAGE_BUCKET_NAME: "baserow"
      AWS_S3_ENDPOINT_URL: "http://garage.garage.svc.cluster.local:3900"
      AWS_S3_REGION_NAME: "home"
      AWS_S3_CUSTOM_DOMAIN: ""
