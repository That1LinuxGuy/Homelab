apiVersion: garage.rajsingh.info/v1beta2
kind: GarageCluster
metadata:
  name: garage
  namespace: garage
spec:
  zone: home
  replication:
    factor: 3
  storage:
    replicas: 2
    metadata:
      size: 10Gi
      storageClassName: longhorn-triple
    data:
      size: 100Gi
      storageClassName: longhorn-double
  network:
    rpcBindPort: 3901
    service:
      type: ClusterIP
  admin:
    adminTokenSecretRef:
      name: garage-admin-token
      key: admin-token
  monitoring:
    enabled: true
